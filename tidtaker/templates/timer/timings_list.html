{{define "timings_list"}}
{{if .Timings}}
<div class="space-y-3">
  {{range .Timings}}
  {{template "timing_item" (dict "Timing" .)}}
  {{end}}
</div>

{{if .HasMore}}
<div class="text-center py-4"
  hx-get="/api/timings/list?page={{add .Page 1}}"
  hx-trigger="revealed"
  hx-swap="afterend"
  hx-target="this">
  <span class="htmx-indicator text-gray-500">Laster...</span>
</div>
{{end}}
{{else}}
<div class="text-center py-8 text-gray-500">
  Ingen tidsregistreringer ennå. Start en timer!
</div>
{{end}}
{{end}}

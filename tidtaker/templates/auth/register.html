{{define "title"}}Registrer{{end}}
{{define "content"}}
<div class="max-w-md mx-auto mt-16">
  <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Tidtaker</h1>
  <div class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-xl font-semibold mb-6 text-gray-700">Opprett konto</h2>

    {{if .Error}}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" id="error-msg">
      {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/register">
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-post</label>
        <input type="email" id="email" name="email" value="{{if .Email}}{{.Email}}{{end}}"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required autocomplete="email">
      </div>

      <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Passord</label>
        <input type="password" id="password" name="password"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required minlength="8" autocomplete="new-password">
      </div>

      <div class="mb-6">
        <label for="passwordConfirm" class="block text-sm font-medium text-gray-700 mb-1">Bekreft passord</label>
        <input type="password" id="passwordConfirm" name="passwordConfirm"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          required minlength="8" autocomplete="new-password">
      </div>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors font-medium">
        Registrer
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      Har du allerede en konto?
      <a href="/login" class="text-blue-600 hover:underline">Logg inn</a>
    </p>
  </div>
</div>
{{end}}
